<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Overview | HCL</title>
    <link rel="icon" type="image/png" href="logo_hcl_main.png">
    <style>
        :root {
            --bg-color: #f8fafc; --card-bg: #ffffff; --border: #e2e8f0;
            --text-main: #0f172a; --text-muted: #64748b; --accent: #0066cc;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding-bottom: 50px; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        /* Hero Section */
        .match-header { background: #fff; padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .match-meta { color: var(--accent); font-weight: 700; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; }
        .teams-showcase { display: flex; align-items: center; justify-content: center; gap: 40px; margin-top: 20px; }
        .team-box { width: 150px; }
        .team-box h2 { margin: 10px 0 5px; font-size: 1.1rem; }
        .manager-name { font-size: 0.85rem; color: var(--text-muted); }
        
        /* Stats Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .stat-val { font-size: 1.5rem; font-weight: 800; margin-top: 5px; }
        
        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 0.75rem; color: var(--text-muted); padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div id="nav-mount"></div> <div class="match-header">
        <div class="match-meta" id="match-meta">Loading Match...</div>
        <div class="teams-showcase" id="teams-showcase">
            </div>
    </div>

    <div class="container">
        <div class="grid">
            <div class="card">
                <div class="stat-label">Win Probability</div>
                <div class="stat-val" id="win-prob">-</div>
            </div>
            <div class="card">
                <div class="stat-label">Recent Form</div>
                <div class="stat-val" id="recent-form" style="display:flex; gap:10px;">-</div>
            </div>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Home Lineup</h3>
                <table id="home-lineup"><thead><tr><th>Player</th><th>OVR</th></tr></thead><tbody></tbody></table>
            </div>
            <div class="card">
                <h3>Away Lineup</h3>
                <table id="away-lineup"><thead><tr><th>Player</th><th>OVR</th></tr></thead><tbody></tbody></table>
            </div>
        </div>
    </div>

    <script src="navbar.js"></script>
    <script>
        // Data Handling Logic
        async function loadMatch() {
            const params = new URLSearchParams(window.location.search);
            const week = params.get('week');
            const index = params.get('matchindex');

            // Fetching all CSVs in parallel for performance
            const [sched, teams, roster] = await Promise.all([
                fetch('HCL Controller - Schedule & Results.csv').then(r => r.text()),
                fetch('HCL Controller - Teams.csv').then(r => r.text()),
                fetch('HCL Controller - Roster.csv').then(r => r.text())
            ]);

            // Logic: Parse CSV rows (simplified)
            const parse = (csv) => csv.split('\n').map(row => row.split(','));
            const scheduleRows = parse(sched);
            const teamRows = parse(teams);
            const rosterRows = parse(roster);

            // 1. Identify Match
            const matchData = scheduleRows.filter(r => r[0] == week)[index];
            const home = matchData[4];
            const away = matchData[6];
            
            // 2. DOM Updates
            document.getElementById('match-meta').innerText = `Season 1 | Week ${week}`;
            document.getElementById('teams-showcase').innerHTML = `
                <div class="team-box"><h2>${home}</h2><div class="manager-name" id="mgr-home"></div></div>
                <div style="font-weight:800; font-size:1.5rem;">vs</div>
                <div class="team-box"><h2>${away}</h2><div class="manager-name" id="mgr-away"></div></div>
            `;

            // 3. Populate Managers
            const getMgr = (tName) => teamRows.find(r => r[0] === tName)?.[2] || "Unassigned";
            document.getElementById('mgr-home').innerText = `Manager: ${getMgr(home)}`;
            document.getElementById('mgr-away').innerText = `Manager: ${getMgr(away)}`;

            // 4. Populate Lineups
            const populateLineup = (team, tableId) => {
                const players = rosterRows.filter(r => r[3] && r[3].includes(team));
                const tbody = document.querySelector(`#${tableId} tbody`);
                tbody.innerHTML = players.map(p => `
                    <tr><td>${p[1]}</td><td>${p[4]}</td></tr>
                `).join('');
            };
            populateLineup(home, 'home-lineup');
            populateLineup(away, 'away-lineup');
        }

        window.onload = loadMatch;
    </script>
</body>
</html>
