<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Center | HCL</title>
    <link rel="icon" type="image/png" href="logo_hcl_main.png">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #0f172a; --accent: #0066cc; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .match-header { background: #fff; padding: 40px 20px; border-bottom: 1px solid var(--border); text-align: center; border-radius: 0 0 12px 12px; }
        .scoreboard { display: flex; justify-content: center; align-items: center; gap: 40px; margin-top: 20px; }
        .team-box { flex: 1; text-align: center; }
        .score { font-size: 3rem; font-weight: 800; }
        .lineup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .loading { padding: 50px; text-align: center; color: var(--text); }
        .error { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>

    <div id="nav-mount"></div>

    <div class="container" id="app">
        <div class="loading">Initializing Match Center...</div>
    </div>

    <script src="navbar.js"></script>
    <script>
        const CSV_ENDPOINTS = {
            schedule: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRWLzMxExK_CHV8x6uGcYFuDTKIaIfQIFMMrDz89AbrbBtgt4E22U8lmMyr-p3F-_cZcGPmm1qJSSYN/pub?gid=242746494&single=true&output=csv",
            roster: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRWLzMxExK_CHV8x6uGcYFuDTKIaIfQIFMMrDz89AbrbBtgt4E22U8lmMyr-p3F-_cZcGPmm1qJSSYN/pub?gid=0&single=true&output=csv"
        };

        async function init() {
            try {
                const [schedRes, rosterRes] = await Promise.all([
                    fetch(CSV_ENDPOINTS.schedule).then(r => r.text()),
                    fetch(CSV_ENDPOINTS.roster).then(r => r.text())
                ]);

                const schedLines = schedRes.split(/\r\n|\n/).filter(line => line.trim() !== "");
                const rosterLines = rosterRes.split(/\r\n|\n/).filter(line => line.trim() !== "");
                
                const params = new URLSearchParams(window.location.search);
                const matchIndex = parseInt(params.get('matchindex'));
                
                if (isNaN(matchIndex)) throw new Error("Invalid Match");

                // Headers: WEEK,DATE,TIME,STATUS,HOME,HOME SCORE,AWAY,AWAY SCORE
                const matchData = schedLines[matchIndex + 1].split(',');
                
                render(matchData, rosterLines);
            } catch (err) {
                document.getElementById('app').innerHTML = `<div class="loading error">Failed to load match. Please check data source.</div>`;
            }
        }

        function render(match, roster) {
            const [week, date, time, status, home, hScore, away, aScore] = match;
            
            document.getElementById('app').innerHTML = `
                <div class="match-header">
                    <div style="font-size: 0.8rem; font-weight: 700; color: #64748b;">WEEK ${week} • ${date} • ${time}</div>
                    <div class="scoreboard">
                        <div class="team-box"><h3>${home}</h3></div>
                        <div class="score">${hScore || 0} - ${aScore || 0}</div>
                        <div class="team-box"><h3>${away}</h3></div>
                    </div>
                </div>
                <div class="lineup-grid">
                    <div class="card">
                        <h4>${home} Lineup</h4>
                        <ul id="home-players"></ul>
                    </div>
                    <div class="card">
                        <h4>${away} Lineup</h4>
                        <ul id="away-players"></ul>
                    </div>
                </div>
            `;

            // Filter roster for matching teams
            roster.slice(1).forEach(row => {
                const cols = row.split(',');
                const playerName = cols[1];
                const teamName = cols[3].replace(/[\[\]]/g, ''); // Cleaning "[CFC] Cranbourne" to "CFC"
                
                if(teamName.includes(home.split(' ')[0])) {
                    document.getElementById('home-players').innerHTML += `<li>${playerName}</li>`;
                } else if(teamName.includes(away.split(' ')[0])) {
                    document.getElementById('away-players').innerHTML += `<li>${playerName}</li>`;
                }
            });
        }

        init();
    </script>
</body>
</html>
